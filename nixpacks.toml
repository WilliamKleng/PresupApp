# Usar Python oficial
FROM python:3.11-slim

# Instalar dependencias del sistema para WeasyPrint y PostgreSQL
RUN apt-get update && apt-get install -y \
    python3-pip python3-cffi python3-brotli libpango-1.0-0 \
    libharfbuzz0b libpangoft2-1.0-0 libpangocairo-1.0-0 \
    libcairo2 libgdk-pixbuf2.0-0 libffi-dev shared-mime-info \
    libpq-dev gcc && \
    apt-get clean && rm -rf /var/lib/apt/lists/*

# Configurar directorio de trabajo
WORKDIR /app

# Copiar archivos de requerimientos e instalar
COPY requirements.txt .
RUN pip install --no-cache-dir -r requirements.txt

# Copiar el resto del código
COPY . .

# Exponer el puerto que usa Railway
EXPOSE 8080

# Comando para arrancar la app
CMD ["gunicorn", "--bind", "0.0.0.0:8080", "app:app"]
{% extends 'base.html' %}
{% block page_title %}Nuevo Cliente - PresupApp{% endblock %}
{% block topbar_title %}Nuevo Cliente{% endblock %}
{% block topbar_actions %}
    <a href="{{ url_for('clientes') }}" class="btn btn-ghost">Cancelar</a>
    <button type="submit" form="nuevo-cliente-form" class="btn btn-primary">Guardar Cliente</button>
{% endblock %}
{% block content %}
<form method="post" id="nuevo-cliente-form">
    <div class="form-section">
        <div class="section-title">DATOS DEL CLIENTE</div>
        <div class="form-grid">
            <div class="form-group full">
                <label for="nombre" class="fl">NOMBRE / RAZÓN SOCIAL</label>
                <input type="text" name="nombre" id="nombre" class="fi" required>
            </div>
            <div class="form-group full">
                <label for="direccion" class="fl">DIRECCIÓN</label>
                <input type="text" name="direccion" id="direccion" class="fi">
            </div>
            <div class="form-group">
                <label for="dni_cuit" class="fl">DNI/CUIT</label>
                <input type="text" name="dni_cuit" id="dni_cuit" class="fi">
            </div>
            <div class="form-group">
                <label for="telefono" class="fl">TELÉFONO</label>
                <input type="text" name="telefono" id="telefono" class="fi">
            </div>
            <div class="form-group">
                <label for="mail" class="fl">EMAIL</label>
                <input type="email" name="mail" id="mail" class="fi">
            </div>
        </div>
    </div>
</form>
{% endblock %}
